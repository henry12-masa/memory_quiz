<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記憶力トレーニング400問</title>

<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802"
crossorigin="anonymous"></script>

<style>
body{
  margin:0;
  font-family:"Yu Gothic",sans-serif;
  background:#f7f5ff;
  color:#333;
}

header{
  background:#6a1b9a;
  color:white;
  text-align:center;
  padding:20px;
}

.layout{
  display:grid;
  grid-template-columns:180px 1fr 180px;
  gap:20px;
  max-width:1500px;
  margin:20px auto;
  padding:0 12px;
}

.ad{
  background:white;
  border-radius:12px;
  padding:10px;
  min-height:300px;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
}

main{
  background:white;
  border-radius:16px;
  padding:24px;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

.status{
  font-weight:bold;
}

select{
  padding:10px;
  border-radius:8px;
  font-size:16px;
}

.memory-box{
  background:#f0e8ff;
  border-radius:14px;
  padding:28px;
  text-align:center;
  font-size:38px;
  font-weight:bold;
  letter-spacing:6px;
  margin-bottom:20px;
  min-height:70px;
}

.question{
  font-size:22px;
  line-height:1.8;
  margin-bottom:20px;
  background:#faf7ff;
  padding:18px;
  border-radius:12px;
  text-align:center;
}

.choices{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

button{
  border:none;
  border-radius:12px;
  padding:16px;
  font-size:18px;
  cursor:pointer;
}

.choice-btn{
  background:#e4d7ff;
}

.choice-btn:hover{
  background:#d0baff;
}

.correct{
  background:#7bd389!important;
}

.wrong{
  background:#ff8a80!important;
}

.result{
  margin-top:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  min-height:36px;
}

.start-btn,
.next-btn,
.restart-btn{
  margin-top:20px;
  width:100%;
  background:#6a1b9a;
  color:white;
}

.final{
  text-align:center;
  font-size:28px;
  line-height:1.8;
}

@media(max-width:900px){

  .layout{
    grid-template-columns:1fr;
  }

  .choices{
    grid-template-columns:1fr;
  }

  .memory-box{
    font-size:28px;
  }

}
</style>
</head>

<body>

<header>
  <h1>記憶力トレーニング400問</h1>
  <p>50問ランダム出題！記憶力を鍛えよう！</p>
</header>

<div class="layout">

<!-- 左広告 -->
<aside class="ad">

<!-- チェス -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8398161859137802"
     data-ad-slot="5599163841"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>

</aside>

<main>

<div class="topbar">

<div>
問題数：
<select id="questionCount">
<option value="10">10問</option>
<option value="20">20問</option>
<option value="30">30問</option>
<option value="50" selected>50問</option>
</select>
</div>

<div class="status" id="status">
スタートしてください
</div>

</div>

<button class="start-btn" id="startBtn">
トレーニング開始
</button>

<div id="quizArea" style="display:none;">

<div class="memory-box" id="memoryBox"></div>

<div class="question" id="question"></div>

<div class="choices" id="choices"></div>

<div class="result" id="result"></div>

<button class="next-btn" id="nextBtn">
次の問題へ
</button>

<button class="restart-btn" id="restartBtn">
もう一度遊ぶ
</button>

</div>

</main>

<!-- 右広告 -->
<aside class="ad">

<!-- チェス -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8398161859137802"
     data-ad-slot="5599163841"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>

</aside>

</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<script>

// ===== ベース問題 =====
const patterns = [

{
memory:"🍎 🍌 🍇 🍓",
question:"3番目に表示されていたものは？",
answer:"🍇",
choices:["🍎","🍌","🍇","🍓"]
},

{
memory:"犬・猫・鳥・馬",
question:"2番目に表示されていた動物は？",
answer:"猫",
choices:["犬","猫","鳥","馬"]
},

{
memory:"7 4 9 2",
question:"最後の数字は？",
answer:"2",
choices:["7","4","9","2"]
},

{
memory:"赤 → 青 → 黄 → 緑",
question:"青の次に出た色は？",
answer:"黄",
choices:["赤","青","黄","緑"]
},

{
memory:"A K M T",
question:"最初の文字は？",
answer:"A",
choices:["A","K","M","T"]
},

{
memory:"月 火 水 木",
question:"3番目に出た曜日は？",
answer:"水",
choices:["月","火","水","木"]
},

{
memory:"東京・大阪・京都・福岡",
question:"最後に表示された都市は？",
answer:"福岡",
choices:["東京","大阪","京都","福岡"]
},

{
memory:"3 8 1 6",
question:"2番目の数字は？",
answer:"8",
choices:["3","8","1","6"]
},

{
memory:"🍔 🍟 🍕 🌭",
question:"1番目に表示された食べ物は？",
answer:"🍔",
choices:["🍔","🍟","🍕","🌭"]
},

{
memory:"春 夏 秋 冬",
question:"秋の前に表示された季節は？",
answer:"夏",
choices:["春","夏","秋","冬"]
},

{
memory:"5 2 8 4 9",
question:"中央にあった数字は？",
answer:"8",
choices:["5","2","8","9"]
},

{
memory:"白 黒 赤 青",
question:"最後の色は？",
answer:"青",
choices:["白","黒","赤","青"]
}

];

// ===== 400問生成 =====
const quizData=[];

for(let i=1;i<=34;i++){

patterns.forEach(q=>{

quizData.push({
memory:q.memory,
question:`【${i}】${q.question}`,
answer:q.answer,
choices:[...q.choices]
});

});

}

patterns.slice(0,8).forEach((q,index)=>{

quizData.push({
memory:q.memory,
question:`【追加${index+1}】${q.question}`,
answer:q.answer,
choices:[...q.choices]
});

});

// ===== シャッフル =====
function shuffle(array){

return array.sort(()=>Math.random()-0.5);

}

let quizzes=[];
let currentQuiz=0;
let score=0;
let answered=false;

const startBtn=document.getElementById("startBtn");
const quizArea=document.getElementById("quizArea");
const memoryBox=document.getElementById("memoryBox");
const questionEl=document.getElementById("question");
const choicesEl=document.getElementById("choices");
const resultEl=document.getElementById("result");
const nextBtn=document.getElementById("nextBtn");
const restartBtn=document.getElementById("restartBtn");
const statusEl=document.getElementById("status");

startBtn.onclick=()=>{

const count=
Number(document.getElementById("questionCount").value);

quizzes=
shuffle([...quizData]).slice(0,count);

currentQuiz=0;
score=0;

startBtn.style.display="none";

quizArea.style.display="block";

loadQuiz();

};

function loadQuiz(){

answered=false;

resultEl.textContent="";

nextBtn.style.display="none";

choicesEl.innerHTML="";

const quiz=quizzes[currentQuiz];

statusEl.textContent=
`第${currentQuiz+1}問 / ${quizzes.length}問 ｜ 正解 ${score}`;

memoryBox.textContent=
quiz.memory;

questionEl.textContent=
"3秒間覚えてください";

choicesEl.style.display="none";

setTimeout(()=>{

memoryBox.textContent=
"？？？？";

questionEl.textContent=
quiz.question;

choicesEl.style.display="grid";

shuffle([...quiz.choices]).forEach(choice=>{

const btn=
document.createElement("button");

btn.textContent=choice;

btn.className="choice-btn";

btn.onclick=()=>checkAnswer(btn,choice);

choicesEl.appendChild(btn);

});

},3000);

}

function checkAnswer(button,selected){

if(answered)return;

answered=true;

const correctAnswer=
quizzes[currentQuiz].answer;

const buttons=
choicesEl.querySelectorAll("button");

buttons.forEach(btn=>{

if(btn.textContent===correctAnswer){

btn.classList.add("correct");

}

});

if(selected===correctAnswer){

score++;

button.classList.add("correct");

resultEl.textContent="正解！";

}else{

button.classList.add("wrong");

resultEl.textContent=
`不正解！ 正解は「${correctAnswer}」`;

}

nextBtn.style.display="block";

}

nextBtn.onclick=()=>{

currentQuiz++;

if(currentQuiz<quizzes.length){

loadQuiz();

}else{

showFinal();

}

};

restartBtn.onclick=()=>{

location.reload();

};

function showFinal(){

const percent=
Math.round((score/quizzes.length)*100);

let rank="";

if(percent>=90){

rank="Sランク：記憶力マスター！";

}else if(percent>=70){

rank="Aランク：かなり記憶力あり！";

}else if(percent>=50){

rank="Bランク：いい感じ！";

}else{

rank="Cランク：再挑戦しよう！";

}

memoryBox.textContent="";

questionEl.innerHTML=`
<div class="final">
トレーニング終了！<br>
${quizzes.length}問中 ${score}問正解！<br>
正答率：${percent}%<br><br>
${rank}
</div>
`;

choicesEl.innerHTML="";

resultEl.textContent="";

nextBtn.style.display="none";

restartBtn.style.display="block";

statusEl.textContent="終了";

}

</script>

</body>
</html>
